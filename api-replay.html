<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dice Roll API Replay</title>
		<style>
			:root {
				color-scheme: dark;
				font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: #101114;
				color: #f5f7f8;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				margin: 0;
			}

			body {
				overflow: hidden;
			}

			button,
			input,
			textarea {
				font: inherit;
			}

			.app {
				display: grid;
				grid-template-columns: minmax(360px, 440px) 1fr;
				width: 100%;
				height: 100%;
				background: #101114;
			}

			.panel {
				display: grid;
				grid-template-rows: auto auto 1fr auto;
				min-width: 0;
				min-height: 0;
				border-right: 1px solid #2b3033;
				background: #17191d;
			}

			.header {
				padding: 18px 18px 14px;
				border-bottom: 1px solid #2b3033;
			}

			h1 {
				margin: 0;
				font-size: 18px;
				font-weight: 700;
				letter-spacing: 0;
			}

			.controls,
			.footer {
				display: grid;
				gap: 10px;
				padding: 14px 18px;
				border-bottom: 1px solid #2b3033;
			}

			.footer {
				border-top: 1px solid #2b3033;
				border-bottom: 0;
			}

			.row {
				display: grid;
				grid-template-columns: 1fr auto;
				gap: 8px;
				align-items: center;
			}

			label {
				display: grid;
				gap: 6px;
				min-width: 0;
				color: #b9c0c4;
				font-size: 12px;
				font-weight: 600;
				text-transform: uppercase;
			}

			input,
			textarea {
				width: 100%;
				border: 1px solid #343a3f;
				border-radius: 6px;
				background: #0f1114;
				color: #f5f7f8;
				outline: none;
			}

			input {
				height: 38px;
				padding: 0 11px;
			}

			input:focus,
			textarea:focus {
				border-color: #58b879;
				box-shadow: 0 0 0 2px rgba(88, 184, 121, .16);
			}

			button {
				height: 38px;
				padding: 0 13px;
				border: 1px solid #3f4844;
				border-radius: 6px;
				background: #223129;
				color: #f5f7f8;
				font-weight: 700;
				cursor: pointer;
			}

			button:hover {
				background: #2b4635;
			}

			button.secondary {
				background: #20242a;
				border-color: #363c43;
			}

			button.secondary:hover {
				background: #2a3037;
			}

			textarea {
				height: 100%;
				min-height: 0;
				padding: 12px;
				resize: none;
				border: 0;
				border-radius: 0;
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
				font-size: 12px;
				line-height: 1.45;
			}

			.result {
				min-height: 22px;
				color: #f5f7f8;
				font-size: 14px;
				font-weight: 700;
			}

			.status {
				min-height: 20px;
				color: #9aa3a9;
				font-size: 13px;
			}

			.stage {
				position: relative;
				min-width: 0;
				min-height: 0;
				background:
					linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 34%),
					#202326;
			}

			#dice-box {
				position: absolute;
				inset: 0;
				overflow: hidden;
			}

			#dice-box canvas {
				display: block;
				width: 100%;
				height: 100%;
			}

			@media (max-width: 860px) {
				body {
					overflow: auto;
				}

				.app {
					grid-template-columns: 1fr;
					grid-template-rows: minmax(460px, 54vh) minmax(520px, 46vh);
				}

				.panel {
					order: 2;
					border-right: 0;
					border-top: 1px solid #2b3033;
				}

				.stage {
					order: 1;
				}
			}
		</style>
	</head>
	<body>
		<main class="app">
			<section class="panel">
				<div class="header">
					<h1>Dice Roll API Replay</h1>
				</div>
				<div class="controls">
					<label>
						Endpoint
						<div class="row">
							<input id="endpoint" value="/api/roll?notation=2d20kh1" spellcheck="false" />
							<button id="fetch-roll" type="button">Fetch</button>
						</div>
					</label>
					<label>
						Playback
						<div class="row">
							<input id="speed" value="1" inputmode="decimal" />
							<button id="replay-json" type="button">Replay</button>
						</div>
					</label>
				</div>
				<textarea id="payload" spellcheck="false"></textarea>
				<div class="footer">
					<div id="result" class="result"></div>
					<div id="status" class="status">Initializing</div>
				</div>
			</section>
			<section class="stage">
				<div id="dice-box"></div>
			</section>
		</main>

		<script type="module">
			import DiceBox from '/src/index.js'

			const endpoint = document.querySelector('#endpoint')
			const payload = document.querySelector('#payload')
			const fetchRoll = document.querySelector('#fetch-roll')
			const replayJson = document.querySelector('#replay-json')
			const speed = document.querySelector('#speed')
			const result = document.querySelector('#result')
			const status = document.querySelector('#status')

			const diceBox = new DiceBox({
				container: '#dice-box',
				assetPath: '/assets/dice-box/',
				offscreen: false,
			})

			const setStatus = message => {
				status.textContent = message
			}

			const setResults = trace => {
				const metadata = trace?.metadata || {}
				const results = metadata.results || []
				if (metadata.finalResult) {
					const label = metadata.finalResult.notation || metadata.notation || 'Roll'
					result.textContent = `${label}: ${metadata.finalResult.value}`
					return
				}
				if (!results?.length) {
					result.textContent = ''
					return
				}
				result.textContent = results.map(group => {
					const label = group.notation || `${group.qty}d${group.sides}`
					return `${label}: ${group.value}`
				}).join('   ')
			}

			const endpointWithCanvasSize = value => {
				const canvas = document.querySelector('#dice-box canvas')
				return DiceBox.createRollApiUrl({
					endpoint: value,
					width: canvas ? canvas.clientWidth || canvas.width : undefined,
					height: canvas ? canvas.clientHeight || canvas.height : undefined,
				})
			}

			const replayPayload = async () => {
				const trace = JSON.parse(payload.value)
				setResults(trace)
				setStatus('Replaying')
				await diceBox.replay(trace, { speed: Number(speed.value) || 1 })
				setStatus('Ready')
			}

			const fetchPayload = async () => {
				setStatus('Rolling')
				const response = await fetch(endpointWithCanvasSize(endpoint.value))
				const trace = await response.json()
				if (!response.ok) {
					throw new Error(trace.error || response.statusText)
				}
				payload.value = JSON.stringify(trace, null, 2)
				await replayPayload()
			}

			fetchRoll.addEventListener('click', () => {
				fetchPayload().catch(error => setStatus(error.message))
			})

			replayJson.addEventListener('click', () => {
				replayPayload().catch(error => setStatus(error.message))
			})

			await diceBox.init()
			setStatus('Ready')
		</script>
	</body>
</html>
